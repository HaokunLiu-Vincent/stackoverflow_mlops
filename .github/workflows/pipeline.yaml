name: Run ClearML Task

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    env:
      CLEARML_API_ACCESS_KEY: ${{ secrets.CLEARML_API_ACCESS_KEY }}
      CLEARML_API_SECRET_KEY: ${{ secrets.CLEARML_API_SECRET_KEY }}
      CLEARML_API_HOST: ${{ secrets.CLEARML_API_HOST }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install clearml datasets pandas scikit-learn transformers accelerate matplotlib

      - name: Debug ENV
        run: |
          echo "CLEARML_API_HOST=$CLEARML_API_HOST"
          if [ -z "$CLEARML_API_HOST" ]; then echo "❌ HOST is empty!"; exit 1; fi
          curl -I $CLEARML_API_HOST

      - name: Step 1 - Dataset artifact
        run: python hpo_s1_dataset_artifact.py

      - name: Step 2 - Process dataset
        run: python hpo_s2_process_dataset.py

      - name: Step 3 - Train model
        run: python hpo_s3_train_model.py